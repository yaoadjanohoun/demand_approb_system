{% if page_obj.has_other_pages %}
<div class="pagination">
    {% if page_obj.has_previous %}
        <a class="btn btn-secondary btn-sm" href="?page={{ page_obj.previous_page_number }}{% if active_type %}&type={{ active_type }}{% endif %}">← Précédent</a>
    {% endif %}
    <span class="pagination-info">Page {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
        <a class="btn btn-secondary btn-sm" href="?page={{ page_obj.next_page_number }}{% if active_type %}&type={{ active_type }}{% endif %}">Suivant →</a>
    {% endif %}
</div>
{% endif %}
