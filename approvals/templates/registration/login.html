{% extends "approvals/base.html" %}
{% block title %}Connexion{% endblock %}
{% block guest_content %}
<div class="card">
    <h1>Connexion</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="checkbox-row">
            <input type="checkbox" id="toggle-password">
            <label for="toggle-password">Afficher le mot de passe</label>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top:1rem; width:100%; justify-content:center;">Se connecter</button>
    </form>
    <p class="card-note" style="text-align:center;">
        <a href="{% url 'password_reset' %}">Mot de passe oublié ?</a>
        · <a href="{% url 'approvals:register' %}">Créer un compte</a>
    </p>
</div>
<script>
    document.getElementById('toggle-password').addEventListener('change', function () {
        var pwd = document.getElementById('id_password');
        if (pwd) pwd.type = this.checked ? 'text' : 'password';
    });
</script>
{% endblock %}
