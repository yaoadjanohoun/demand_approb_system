{% extends "approvals/base.html" %}
{% block title %}Mot de passe oublié{% endblock %}
{% block content %}
<div class="card" style="max-width: 380px; margin: 0 auto;">
    <h1>Mot de passe oublié</h1>
    <p>Indique ton adresse email, un lien de réinitialisation te sera envoyé.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary" style="margin-top:1rem;">Envoyer le lien</button>
    </form>
</div>
{% endblock %}
