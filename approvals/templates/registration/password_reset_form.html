{% extends "approvals/base.html" %}
{% block title %}Mot de passe oublié{% endblock %}
{% block guest_content %}
<div class="card">
    <h1>Mot de passe oublié</h1>
    <p>Indiquez votre adresse email, un lien de réinitialisation vous sera envoyé.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary" style="margin-top:1rem; justify-content: center;">Envoyer le lien</button>
    </form>

    <p class="card-note" style="text-align:center;">
        <a style="margin-top:1rem; width:100%; justify-content:center;" href="{% url 'login' %}">
            Retour à la connexion
        </a>
    </p>

</div>
   
{% endblock %}
