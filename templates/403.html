<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Accès refusé</title>
    <style>
        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #f4f5f7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .box {
            max-width: 420px; margin: 1.5rem; padding: 2rem; background: #fff; border-radius: 14px;
            box-shadow: 0 4px 16px rgba(20, 22, 30, 0.08); text-align: center;
        }
        .box h1 { margin: 0 0 0.5rem; font-size: 1.25rem; color: #c1362b; }
        .box p { margin: 0 0 1.5rem; color: #6b7180; font-size: 0.92rem; line-height: 1.5; }
        .box a {
            display: inline-block; padding: 0.6rem 1.3rem; border-radius: 6px; background: #4338ca;
            color: #fff; text-decoration: none; font-weight: 600; font-size: 0.9rem;
        }
        .box a:hover { background: #372da3; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Accès refusé</h1>
        <p>Tu n'as pas la permission d'accéder à cette page. Si tu penses que c'est une erreur, contacte un administrateur fonctionnel.</p>
        <a href="/">Retour à l'accueil</a>
    </div>
</body>
</html>
